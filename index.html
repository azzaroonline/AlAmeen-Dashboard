<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Ameen Central Hub | لوحة تحكم الأمين المركزية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' } },
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* DataTables Core Styling */
        div.dataTables_wrapper { width: 100%; margin: 0 auto; }
        table.dataTable { width: 100% !important; margin-top: 10px !important;}
        table.dataTable tbody tr { background-color: transparent !important; border-bottom: 1px solid rgba(51, 65, 85, 0.5); }
        table.dataTable thead th, table.dataTable tfoot th { border-bottom: 2px solid #3b82f6 !important; color: #94a3b8; font-weight: 700; text-align: right !important; padding: 12px 10px;}
        table.dataTable tbody td { padding: 12px 10px; vertical-align: middle; text-align: right !important;}
        
        /* DataTables Controls Styling */
        .dataTables_wrapper .dataTables_length, .dataTables_wrapper .dataTables_filter, .dataTables_wrapper .dataTables_info, .dataTables_wrapper .dataTables_paginate { color: #cbd5e1 !important; }
        .dataTables_wrapper .dataTables_filter input { background-color: #1e293b; color: white; border: 1px solid #475569; border-radius: 6px; padding: 6px 12px; margin-right: 8px; }
        .dataTables_wrapper .dataTables_paginate .paginate_button { color: #cbd5e1 !important; border-color: transparent !important; }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current, .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover { background: #3b82f6 !important; color: white !important; border-color: #2563eb !important; border-radius: 6px;}
        table.dataTable tbody tr:hover { background-color: rgba(59, 130, 246, 0.1) !important; transition: background 0.2s;}
        
        /* Horizontal Scroll specific adjustments */
        .dataTables_scrollBody::-webkit-scrollbar { height: 8px; width: 8px; }
        .dataTables_scrollBody::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .dataTables_scrollBody::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        .dataTables_scrollBody::-webkit-scrollbar-thumb:hover { background: #2563eb; }
        
        /* Auth Screen Background */
        .auth-bg { background-color: #0f172a; background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); }
        
        /* Custom styled select box */
        select option { background: #1e293b; color: white; padding: 10px; }
        
        /* Mobile specific fixes */
        @media (max-width: 768px) {
            .dataTables_wrapper .dataTables_filter { display: block !important; margin-bottom: 10px !important; text-align: center !important;}
            .dataTables_wrapper .dataTables_filter input { width: 100% !important; margin: 8px 0 0 0 !important; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative w-full">

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center auth-bg transition-opacity duration-500">
        <div class="glass p-8 md:p-10 rounded-2xl w-full max-w-sm shadow-2xl border border-blue-500/20 text-center mx-4">
            <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full mx-auto flex items-center justify-center text-4xl mb-6 shadow-lg shadow-blue-500/50 text-white">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h2 class="text-3xl font-bold mb-2 text-white">المركز الرئيسي</h2>
            <p class="text-slate-400 mb-8 text-sm">أدخل بيانات العبور</p>
            
            <form id="login-form">
                <div class="mb-5 text-right">
                    <input type="text" id="username" class="w-full bg-slate-800/80 border border-slate-700/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-all text-center tracking-widest" required placeholder="User">
                </div>
                <div class="mb-8 text-right">
                    <input type="password" id="password" class="w-full bg-slate-800/80 border border-slate-700/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-all text-center tracking-[0.5em]" required placeholder="••••">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg shadow-blue-500/30 transform hover:scale-[1.02]">
                    دخول محمي
                </button>
                <p id="auth-error" class="text-red-400 font-bold text-sm mt-4 hidden bg-red-500/10 py-2 rounded-lg"><i class="fa-solid fa-circle-exclamation ml-1"></i> الرمز غير صحيح</p>
            </form>
        </div>
    </div>

    <!-- Main App Wrapper -->
    <div id="app-wrapper" class="hidden flex-1 flex flex-col w-full h-full">
        <!-- Header -->
        <header class="glass sticky top-0 z-50 shadow-md">
            <div class="py-3 px-4 md:px-6 flex flex-col md:flex-row justify-between items-center gap-3">
                <div class="flex items-center gap-3 w-full md:w-auto">
                    <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-xl font-bold text-white shrink-0">
                        <i class="fa-solid fa-cubes"></i>
                    </div>
                    <div>
                        <h1 class="text-lg md:text-xl font-bold bg-clip-text text-transparent bg-gradient-to-l from-blue-300 to-indigo-400">بانوراما فروع الأمين</h1>
                        <p class="text-[10px] md:text-xs text-slate-400"><span class="text-green-400 mr-1"><i class="fa-solid fa-circle-dot fa-xs animate-pulse"></i> بث حي</span> التزامن السحابي قيد العمل</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-2 w-full md:w-auto">
                    <!-- Dropdown for Branches -->
                    <div class="relative w-full md:w-64">
                        <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-blue-400">
                            <i class="fa-solid fa-map-location-dot"></i>
                        </div>
                        <select id="branch-selector" onchange="switchBranchFromDropdown()" class="w-full bg-slate-800 border border-slate-600 text-white rounded-lg py-2 pl-4 pr-10 text-sm focus:outline-none focus:border-blue-500 shadow-inner appearance-none cursor-pointer font-bold">
                            <!-- Populated by JS -->
                        </select>
                        <div class="absolute inset-y-0 left-0 flex items-center px-3 pointer-events-none text-slate-400">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                    
                    <!-- Remote Trigger Button -->
                    <button onclick="forceRemoteSync()" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-green-500/10 hover:bg-green-500/20 text-green-400 border border-green-500/20 transition-colors font-bold text-sm shrink-0 shadow-lg shadow-green-500/10" title="أمر سحابي بجلب بيانات اللحظة من الحواسيب">
                        <i class="fa-solid fa-bolt text-yellow-400"></i> <span class="hidden md:inline">جرد فورّي بإذن الإدارة</span>
                    </button>
                    
                    <button onclick="logout()" class="w-10 h-10 flex items-center justify-center rounded-lg bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 transition-colors shrink-0" title="تسجيل الخروج">
                        <i class="fa-solid fa-power-off"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 p-3 md:p-6 w-full mx-auto" style="max-width: 100vw;">
            <!-- Status Card -->
            <div id="master-banner" class="glass rounded-xl p-4 md:p-6 mb-4 flex flex-col md:flex-row justify-between items-center gap-4 bg-gradient-to-r from-blue-900/30 to-indigo-900/30 border-blue-500/20 shadow-lg">
                <div class="w-full md:w-auto text-center md:text-right">
                    <h2 id="view-title" class="text-xl md:text-2xl font-bold mb-1 text-white">...</h2>
                    <p id="view-subtitle" class="text-slate-400 text-[11px] md:text-sm">...</p>
                </div>
                
                <!-- Individual Branch Info -->
                <div id="status-card" class="w-full md:w-auto text-center rounded-lg border border-slate-700/50 bg-slate-800/80 px-4 py-3 shadow-inner hidden flex gap-4 md:flex-col md:gap-1 items-center justify-around">
                    <div>
                        <div class="text-[10px] md:text-xs text-slate-400 mb-1">آخر تحديث من الجهاز المحلي</div>
                        <div id="branch-last-update" class="text-xs md:text-sm font-mono text-white">...</div>
                    </div>
                    <div id="branch-status-badge" class="font-bold text-xs px-3 py-1 rounded text-green-400 bg-green-500/10"><i class="fa-solid fa-wifi"></i> متصل</div>
                </div>
                
                <!-- Master View Info -->
                <div id="aggregate-card" class="w-full md:w-auto text-center rounded-lg border border-blue-500/30 bg-blue-900/20 px-6 py-3 shadow-inner hidden flex gap-6 items-center justify-center">
                    <div>
                        <div class="text-[10px] md:text-xs text-blue-300 font-bold mb-1">عدد الفروع المرتبطة بالشبكة</div>
                        <div class="text-3xl md:text-4xl font-black text-white" id="active-branches-count">0</div>
                    </div>
                </div>
            </div>

            <!-- Table Container -->
            <div class="glass rounded-xl p-3 shadow-2xl relative w-full">
                <!-- DataTables Loading overlay -->
                <div id="loading" class="absolute inset-0 z-10 flex bg-slate-900/80 items-center justify-center rounded-xl hidden">
                    <div class="text-blue-500 text-3xl animate-spin"><i class="fa-solid fa-spinner"></i></div>
                </div>
                
                <!-- Notice table uses 100% width and wrapper will handle scroll -->
                <table id="inventoryTable" class="display nowrap text-xs md:text-sm text-right" style="width:100%">
                    <thead>
                        <tr class="bg-slate-800/50">
                            <th>الرمز</th>
                            <th>المادة / الباركود</th>
                            <th class="text-center">المجموعة</th>
                            <th class="text-center bg-blue-900/20">المخزون المتوفر</th>
                            <th>تفاصيل (الفروع)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    
    <!-- Firebase SDK (v8 compat) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        $(document).ready(function() {
            if (localStorage.getItem('ameen_auth') === 'true') {
                $('#auth-screen').hide();
                $('#app-wrapper').removeClass('hidden');
                initFirebaseApp();
            }
        });

        $('#login-form').submit(function(e) {
            e.preventDefault();
            const u = $('#username').val();
            const p = $('#password').val();
            
            // Allow admin/1234 or just 1234
            if((u === 'admin' && p === '1234') || p === '1234') {
                localStorage.setItem('ameen_auth', 'true');
                $('#auth-screen').css('opacity', '0');
                setTimeout(() => {
                    $('#auth-screen').hide();
                    $('#app-wrapper').removeClass('hidden');
                    initFirebaseApp();
                }, 500);
            } else {
                $('#auth-error').slideDown();
                setTimeout(() => $('#auth-error').slideUp(), 3000);
            }
        });

        function logout() {
            localStorage.removeItem('ameen_auth');
            location.reload();
        }

        function forceRemoteSync() {
            if(!confirm('أمر إداري (للمدير فقط): سيتم إيقاظ حواسيب الفروع وإجبارها على سحب الجرد الآن، هل أنت متأكد؟')) return;
            
            db.ref('trigger_sync').set(Date.now().toString()).then(() => {
                alert('⚡ تم وضع أمر التحديث في السحابة.. ستستجيب أجهزة الفروع وتسحب بياناتها خلال 5 ثواني!');
            });
        }

        let db, dataTable;
        let globalBranchesData = {};

        function initFirebaseApp() {
            const firebaseConfig = { databaseURL: "https://data-synchronization-ba5e8-default-rtdb.firebaseio.com" };
            if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
            db = firebase.database();

            dataTable = $('#inventoryTable').DataTable({
                scrollX: true,        
                scrollCollapse: true,
                autoWidth: false,     
                pageLength: 25,
                language: { 
                    url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/ar.json",
                    search: "بحث سريع :",
                    lengthMenu: "عرض _MENU_"
                },
                order: [[3, "desc"]], 
                dom: '<"flex flex-col md:flex-row justify-between items-center mb-4 gap-2"<"w-full md:w-auto text-sm"f><"w-full md:w-auto text-sm hidden md:block"l>>rt<"flex flex-col md:flex-row justify-between items-center mt-4 text-xs"ip>',
                columns: [
                    { data: 'Code', className: 'text-right font-mono text-blue-300 font-bold', width: '90px' },
                    { data: 'Name', className: 'text-right whitespace-normal', render: function(data, type, row) {
                        const bc = row.Barcode || '';
                        let bHtml = '';
                        if(bc) {
                            bHtml = `<div class="text-[10px] text-slate-400 mt-1"><i class="fa-solid fa-barcode mr-1 ml-1 text-[9px]"></i>${bc}</div>`;
                        }
                        return `<div class="font-bold text-white text-xs md:text-sm">${data}</div>${bHtml}`;
                    }},
                    { data: 'Provenance', className: 'text-center font-bold text-indigo-300 text-xs md:text-sm align-middle', defaultContent: '-', width: '90px', render: function(data, type, row) { 
                        return data || row.Group || row.GroupCode || '-'; 
                    }},
                    { data: 'Qty', className: 'text-center bg-blue-900/10 font-black text-sm md:text-lg align-middle', width: '80px', render: function(data) {
                        const q = parseFloat(data) || 0;
                        if(q <= 0) return `<span class="text-red-400 drop-shadow-md"><i class="fa-solid fa-arrow-down text-[10px] ml-1"></i>${q}</span>`;
                        return `<span class="text-green-400 drop-shadow-md">${q}</span>`;
                    }},
                    { data: 'Breakdown', orderable: false, defaultContent: '', width: '250px', render: function(data) {
                        if (!data) return '<span class="text-slate-500">-</span>';
                        return `<div class="flex flex-wrap gap-1 items-start justify-end pr-2 py-1">${data}</div>`;
                    }}
                ]
            });

            setInterval(() => {
                if(dataTable) dataTable.columns.adjust();
            }, 1000);

            $('#loading').show();
            db.ref('branches').on('value', (snapshot) => {
                globalBranchesData = snapshot.val() || {};
                renderBranchDropdown();
                switchBranchFromDropdown(); 
                $('#loading').hide();
            });
        }

        // --- OFFLINE DETECTION LOGIC ADDED HERE ---
        function checkIsOffline(lastUpdatedStr) {
            if (!lastUpdatedStr) return true;
            try {
                const parts = lastUpdatedStr.split(' ');
                if (parts.length === 2) {
                    const lastDate = new Date(parts[0] + 'T' + parts[1]);
                    const diffMins = (new Date() - lastDate) / (1000 * 60);
                    return diffMins > 10;
                }
            } catch(e) {}
            return false;
        }

        function renderBranchDropdown() {
            const selector = $('#branch-selector');
            const currentVal = selector.val() || 'master';
            
            let html = `<option value="master" class="text-blue-300 font-bold">🌐 الجرد المجمّع لكافة الأفرع المتصلة</option>`;
            
            let count = 0;
            const keys = Object.keys(globalBranchesData).sort();
            
            for(let key of keys) {
                const b = globalBranchesData[key];
                const rawName = b.branch_name || key;
                const cleanName = rawName.includes('?') ? 'فرع الأونلاين' : rawName;
                
                // Intelligent Offline Calculation
                const isOffline = checkIsOffline(b.last_updated);
                const statusIcon = isOffline ? '🔴 متوقف |' : '🟢 متصل |';
                const lastUp = b.last_updated ? ` (نبضة: ${b.last_updated.split(' ')[1]})` : '';
                
                html += `<option value="${key}">${statusIcon} ${cleanName}${lastUp}</option>`;
                count++;
            }
            
            $('#active-branches-count').text(count);
            selector.html(html);
            selector.val(currentVal);
            
            if(!selector.val()) selector.val('master');
        }

        function switchBranchFromDropdown() {
            const val = $('#branch-selector').val();
            if (val === 'master') {
                loadMasterView();
            } else {
                loadBranchView(val);
            }
        }

        function loadMasterView() {
            $('#status-card').hide();
            $('#aggregate-card').show();
            $('#view-title').html('<i class="fa-solid fa-globe text-blue-400 ml-2"></i> الجرد المجمّع التراكمي');
            $('#view-subtitle').text('تجميع آلي لجميع الأرصدة المتطابقة من كافة الفروع عبر الرمز.');

            dataTable.columns(2).visible(true); 
            dataTable.columns(4).visible(true); 

            let masterMap = {};
            
            for(let branchKey in globalBranchesData) {
                const branch = globalBranchesData[branchKey];
                const items = branch.items || [];
                const rawName = branch.branch_name || branchKey;
                const cleanName = rawName.includes('?') ? 'أونلاين' : rawName.replace('فرع ', '');
                
                items.forEach(item => {
                    const c = item.Code;
                    if(!c) return;
                    
                    if(!masterMap[c]) {
                        masterMap[c] = { Code: item.Code, Name: item.Name, Barcode: item.Barcode, Provenance: item.Provenance, Qty: 0, Breakdown: '' };
                    }
                    const q = parseFloat(item.Qty) || 0;
                    masterMap[c].Qty += q;
                    
                    if(q > 0) {
                        masterMap[c].Breakdown += `<div class="bg-slate-700/80 border border-slate-600 rounded px-1.5 py-0.5 text-[10px] flex items-center shrink-0"><span>${cleanName}:</span><span class="text-blue-300 font-bold ml-1 mr-1.5">${q}</span></div>`;
                    }
                });
            }

            dataTable.clear().rows.add(Object.values(masterMap)).draw();
            setTimeout(() => dataTable.columns.adjust(), 200);
        }

        function loadBranchView(branchKey) {
            $('#aggregate-card').hide();
            $('#status-card').css('display', 'flex'); 
            
            const branch = globalBranchesData[branchKey];
            if(!branch) return;

            const name = branch.branch_name || branchKey;
            const finalName = name.includes('?') ? 'فرع الأونلاين' : name;
            
            $('#view-title').html(`<i class="fa-solid fa-store text-indigo-400 ml-2"></i> ${finalName}`);
            $('#view-subtitle').text('تقرير الجرد المعزول للفرع المستقل فقط.');
            
            $('#branch-last-update').text(branch.last_updated || 'غير متوفر');
            
            const badge = $('#branch-status-badge');
            
            // Offline Status in View
            const isOffline = checkIsOffline(branch.last_updated);
            
            if(isOffline) {
                badge.removeClass('text-green-400 bg-green-500/10').addClass('text-red-400 bg-red-500/10');
                badge.html('<i class="fa-solid fa-triangle-exclamation ml-1"></i> متوقف (أغلق الجهاز)');
            } else {
                badge.removeClass('text-red-400 bg-red-500/10').addClass('text-green-400 bg-green-500/10');
                badge.html('<i class="fa-solid fa-wifi ml-1"></i> الاتصال المحلي نشط');
            }

            dataTable.columns(2).visible(true); 
            dataTable.columns(4).visible(false); 

            const items = branch.items || [];
            dataTable.clear().rows.add(items).draw();
            setTimeout(() => dataTable.columns.adjust(), 200);
        }
    </script>
</body>
</html>
